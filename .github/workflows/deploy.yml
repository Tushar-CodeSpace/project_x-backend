name: Deploy Backend to Hostinger

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{secrets.SSH_HOST}}
                username: ${{secrets.SSH_USERNAME}}
                key: ${{secrets.SSH_KEY}}
                script: |
                    set -e
                    cd /root/project_x-backend

                    git remote remove origin || true
                    git remote add origin https://github.com/Tushar-CodeSpace/project_x-backend.git

                    git fetch origin
                    git reset --hard origin/main

                    # Start mongodb first (always), then rebuild/restart backend
                    docker compose up -d mongodb
                    
                    # Wait for mongodb to be healthy
                    echo "Waiting for MongoDB to be ready..."
                    sleep 15
                    
                    # Rebuild and restart only backend (keeps mongodb running)
                    docker compose build backend
                    docker compose up -d --no-deps backend
                    
                    echo "Checking backend logs..."
                    sleep 5
                    docker compose logs --tail=20 backend