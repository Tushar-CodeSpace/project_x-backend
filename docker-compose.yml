services:
  mongodb:
    image: mongo:7
    container_name: techblog-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: techblog
    volumes:
      - mongodb_data:/data/db
    networks:
      - techblog-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techblog-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/techblog?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - techblog-network
    volumes:
      - ./src:/app/src

volumes:
  mongodb_data:
    driver: local

networks:
  techblog-network:
    driver: bridge